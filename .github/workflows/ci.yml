name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: signaldesk
          POSTGRES_PASSWORD: signaldesk
          POSTGRES_DB: signaldesk_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U signaldesk"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

      kafka:
        image: confluentinc/cp-kafka:8.1.0
        ports:
          - 9092:9092
        env:
          CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

          KAFKA_LISTENERS: PLAINTEXT://:9092,DOCKER://:29092,CONTROLLER://:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,DOCKER://kafka:29092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,DOCKER:PLAINTEXT,CONTROLLER:PLAINTEXT
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER

          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

    env:
      SIGNALDESK_DATABASE_URL: postgresql+psycopg://signaldesk:signaldesk@localhost:5433/signaldesk_test
      SIGNALDESK_TEST_DATABASE_URL: postgresql+psycopg://signaldesk:signaldesk@localhost:5433/signaldesk_test
      SIGNALDESK_KAFKA_BOOTSTRAP_SERVERS: localhost:9092

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Run checks
        run: make check
